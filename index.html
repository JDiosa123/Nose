<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Me amas?</title>
    <link rel="stylesheet" href="styless.css">
</head>
<body>

    <div class="container">
        <h1>¿Me amas? 💕</h1>

        <div class="botones">
            <button onclick="decirSi()" id="btnSi">Sí 💖</button>
            <button id="btnNo">No 💔</button>
        </div>

        <p id="mensaje"></p>
    </div>

    <script>
        const btnNo = document.getElementById("btnNo");

        btnNo.addEventListener("touchstart", moverBoton);
        btnNo.addEventListener("mouseover", moverBoton);

        function moverBoton() {
            const ancho = window.innerWidth - 100;
            const alto = window.innerHeight - 60;

            const x = Math.random() * ancho;
            const y = Math.random() * alto;

            btnNo.style.position = "absolute";
            btnNo.style.left = x + "px";
            btnNo.style.top = y + "px";
        }

        function decirSi() {
            btnNo.style.display = "none";
            document.getElementById("mensaje").innerHTML = "Sabía que me amabas 😍💞";
        }
    </script>

</body>
</html>
